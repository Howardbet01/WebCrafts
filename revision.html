<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVISION</title>
</head>
<body>
    <form>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <input type="submit" value="Login">
    </form>
    <form>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required><br><br>
        <input type="submit" value="Register"><br><br>
        <label for="date">Date of birth</label>
        <input type="date" id="date" name="date" required><br><br>
        <label for="color">Favourite color</label>
        <input type="color" id="color" name="color" required><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="6" cols="50" required></textarea><br><br>
        <label for="dropdown">Choose an option:</label>
        <select id="dropdown" name="dropdown" required>
            <option value="">Select an option</option>
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>
        </select><br><br>
        <input type="submit" value="Submit">
    </form>
    <form action="">
        <label for="file">Upload a file:</label><br>
        <label for="radio">Select Gender:</label><br>
        <input type="radio" id="option1" name="gender" value="male" required>
        <div></div>
        <label for="option1">Male</label><br>
        <input type="radio" id="option2" name="gender" value="Female" required>
        <label for="option2">Female</label><br>
        <input type="radio" id="option3" name="gender" value="Other" required>
        <label for="option3">Others</label><br><br>
        <input type="file" id="file" name="file" required><br><br>
        <input type="button" value="Choose File" onclick="document.getElementById('file').click();">
        <input type="submit" value="Upload">
    </form>
</body>
</html>
